# Server Configuration
server.port=8080

# Spring Application Name
spring.application.name=conversor-moedas-api

# Active Profile (dev/prod)
spring.profiles.active=dev

# ExchangeRate-API Configuration
exchange-rate.api.url=https://v6.exchangerate-api.com/v6
exchange-rate.api.key=${EXCHANGE_RATE_API_KEY:YOUR_API_KEY_HERE}

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=exchangeRates

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}

# Logging Configuration
logging.level.com.conversormoedas=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
