# Production Profile
server.port=${PORT:8080}

# ExchangeRate-API Configuration
exchange-rate.api.url=https://v6.exchangerate-api.com/v6
exchange-rate.api.key=${EXCHANGE_RATE_API_KEY}

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=exchangeRates

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.com.conversormoedas=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/conversor-moedas.log

# Security Headers
server.error.include-stacktrace=never
server.error.include-message=never
