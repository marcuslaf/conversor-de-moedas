# Server Configuration
server.port=8080

# Spring Application Name
spring.application.name=conversor-moedas-api

# ExchangeRate-API Configuration
exchange-rate.api.url=https://v6.exchangerate-api.com/v6
exchange-rate.api.key=${EXCHANGE_RATE_API_KEY:YOUR_API_KEY_HERE}

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=exchangeRates

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging Configuration
logging.level.com.conversormoedas=INFO
logging.level.org.springframework.web=INFO
